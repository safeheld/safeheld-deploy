server {
    listen 80;
    server_name status.safeheld.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name status.safeheld.com;

    ssl_certificate     /etc/letsencrypt/live/safeheld.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safeheld.com/privkey.pem;

    root /opt/safeheld-status;
    index index.html;

    # Proxy health endpoint to avoid CORS
    location /api/health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
