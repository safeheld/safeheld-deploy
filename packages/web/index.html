<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safeheld — Safeguarding Compliance Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        /* ── Navy palette (brand primary #0C1445) ─────────────────── */
        --color-navy-950: #060a22;
        --color-navy-900: #0C1445;
        --color-navy-800: #162060;
        --color-navy-700: #1f2d7a;
        --color-navy-600: #2d3f99;
        --color-navy-500: #4a5ab3;
        --color-navy-400: #7b89cc;
        --color-navy-300: #b0b8e0;
        --color-navy-200: #d4d9ef;
        --color-navy-100: #eceef7;
        --color-navy-50:  #f5f6fb;

        /* ── Accent (brand blue #3D3DFF) ─────────────────────────── */
        --color-accent: #3D3DFF;
        --color-accent-hover: #2e2ee6;
        --color-accent-light: #ededff;
        --color-accent-muted: #8585ff;

        /* ── Semantic colours ──────────────────────────────────────── */
        --color-success: #10b981;
        --color-success-light: #ecfdf5;
        --color-success-dark: #059669;
        --color-warning: #f59e0b;
        --color-warning-light: #fffbeb;
        --color-warning-dark: #d97706;
        --color-danger: #ef4444;
        --color-danger-light: #fef2f2;
        --color-danger-dark: #dc2626;
        --color-info: #3b82f6;
        --color-info-light: #eff6ff;

        /* ── Legacy aliases (for pages referencing old vars) ────── */
        --color-primary: var(--color-accent);
        --color-primary-light: var(--color-accent-muted);
        --color-primary-dark: var(--color-accent-hover);
        --color-gray-50: var(--color-navy-50);
        --color-gray-100: var(--color-navy-100);
        --color-gray-200: var(--color-navy-200);
        --color-gray-300: var(--color-navy-300);
        --color-gray-400: var(--color-navy-400);
        --color-gray-500: var(--color-navy-500);
        --color-gray-600: var(--color-navy-600);
        --color-gray-700: var(--color-navy-700);
        --color-gray-800: var(--color-navy-800);
        --color-gray-900: var(--color-navy-900);

        /* ── Typography ────────────────────────────────────────────── */
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;

        /* ── Radii ─────────────────────────────────────────────────── */
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;

        /* ── Shadows ───────────────────────────────────────────────── */
        --shadow-xs: 0 1px 2px rgb(12 20 69 / 0.04);
        --shadow-sm: 0 1px 3px rgb(12 20 69 / 0.06), 0 1px 2px rgb(12 20 69 / 0.04);
        --shadow-md: 0 4px 6px -1px rgb(12 20 69 / 0.07), 0 2px 4px -2px rgb(12 20 69 / 0.05);
        --shadow-lg: 0 10px 15px -3px rgb(12 20 69 / 0.08), 0 4px 6px -4px rgb(12 20 69 / 0.04);
        --shadow-xl: 0 20px 25px -5px rgb(12 20 69 / 0.08), 0 8px 10px -6px rgb(12 20 69 / 0.04);

        /* ── Transitions ───────────────────────────────────────────── */
        --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);

        /* ── Sidebar ───────────────────────────────────────────────── */
        --sidebar-width: 260px;
        --sidebar-bg: #0C1445;
      }

      html, body { height: 100%; }
      body {
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--color-navy-800);
        background: var(--color-navy-50);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { height: 100%; }
      button { cursor: pointer; font-family: inherit; }
      input, select, textarea { font-family: inherit; }
      a { color: var(--color-accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ── Spinner ─────────────────────────────────────────────────── */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 32px; height: 32px;
        border: 3px solid var(--color-navy-200);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      /* ── Scrollbar ───────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-navy-300); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-navy-400); }

      /* ── Focus ring ──────────────────────────────────────────────── */
      :focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
